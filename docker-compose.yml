services:
  setup:
    image: node:22-alpine
    container_name: booking-marketplace-setup
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install"
    volumes:
      - ./:/workspace
      - workspace_node_modules:/workspace/node_modules
      - backend_node_modules:/workspace/backend/node_modules
      - frontend_node_modules:/workspace/frontend/node_modules
    restart: "no"

  backend:
    image: node:22-alpine
    container_name: booking-marketplace-backend
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm --filter @booking-marketplace/backend start:dev"
    volumes:
      - ./:/workspace
      - workspace_node_modules:/workspace/node_modules
      - backend_node_modules:/workspace/backend/node_modules
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: BookingMarketplace
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-5d}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    image: node:22-alpine
    container_name: booking-marketplace-frontend
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm --filter @booking-marketplace/frontend exec next dev --webpack --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./:/workspace
      - workspace_node_modules:/workspace/node_modules
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      setup:
        condition: service_completed_successfully
      backend:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: booking-marketplace-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: BookingMarketplace
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: booking-marketplace-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  workspace_node_modules:
  backend_node_modules:
  frontend_node_modules:
